# ─────────────────────────────────────────────────────────────────────────────
# Environmental Data Pipeline — Docker Compose
# Services: Kafka · MongoDB · Airflow · Metabase · GeoJSON Server
# ─────────────────────────────────────────────────────────────────────────────

# ── Shared Airflow configuration (YAML anchor) ────────────────────────────
x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    PYTHONPATH: /opt/airflow/project
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    MONGODB_URI: mongodb://admin:password@mongodb:27017
    MONGODB_DATABASE: environmental_db
    # ── Risk Alert (Email) ───────────────────────────────────────────────────
    ALERT_EMAIL_USER: 'Sapon2548@gmail.com'
    ALERT_EMAIL_PASSWORD: 'fqsk srld njbb cjjf'
    ALERT_EMAIL_TO: 'Sapon2548@gmail.com'
    ALERT_RISK_THRESHOLD: '50'
    ALERT_SMTP_HOST: 'smtp.gmail.com'
    ALERT_SMTP_PORT: '587'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs/airflow:/opt/airflow/logs
    - ./:/opt/airflow/project:ro

services:

  # ── Kafka (KRaft mode) ────────────────────────────────────────────────────
  # Using official Apache Kafka image (bitnami removed from Docker Hub)
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"       # External (host access)
      - "29092:29092"     # Internal (Docker network — Airflow tasks + consumer)
      - "9093:9093"       # Controller (KRaft)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Two listeners:
      #   PLAINTEXT          → 127.0.0.1:9092  (host — producers from terminal)
      #   PLAINTEXT_INTERNAL → kafka:29092     (Docker-internal — Airflow + consumer)
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Topic defaults
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168

    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── MongoDB (Data Warehouse) ───────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=environmental_db
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d   # optional init scripts
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Pipeline Init (one-time — creates MongoDB collections + indexes) ────────
  pipeline-init:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: pipeline-init
    volumes:
      - ./:/app:ro
      - ./logs:/app/logs
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017
      MONGODB_DATABASE: environmental_db
    command: python -m warehouse.schema
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

  # ── Metabase Setup (one-time — configures dashboard + heatmaps) ───────────
  metabase-setup:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: metabase-setup
    volumes:
      - ./:/app:ro
      - ./logs:/app/logs
    environment:
      METABASE_URL: http://metabase:3000
      MONGODB_HOST: mongodb
    command: python setup_metabase.py
    depends_on:
      metabase:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: "no"

  # ── Bronze Consumer (long-running Kafka → MongoDB Bronze) ─────────────────
  # Listens to all Kafka topics and writes raw messages to Bronze collections
  bronze-consumer:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: bronze-consumer
    volumes:
      - ./:/app:ro
      - ./logs:/app/logs
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MONGODB_URI: mongodb://admin:password@mongodb:27017
      MONGODB_DATABASE: environmental_db
    command: python -m consumers.bronze_consumer
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL (Airflow metadata DB) ──────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow Init (runs once — migrates DB and creates admin user) ──────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@airflow.local \
          --password admin
        echo "Airflow init complete"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Airflow Webserver (UI → http://localhost:8080) ────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Airflow Scheduler (executes DAG tasks on schedule) ────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── GeoJSON Static Server (serves province boundaries for Metabase maps) ──
  geojson-server:
    image: nginx:alpine
    container_name: geojson-server
    volumes:
      - ./data:/usr/share/nginx/html:ro
      - ./nginx/geojson.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8899:80"
    restart: unless-stopped

  # ── Metabase (BI / Dashboard) ─────────────────────────────────────────────
  metabase:
    image: metabase/metabase:v0.52.5
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_TIMEZONE: Asia/Bangkok
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ── Mongo Express (optional UI) ────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_URL=mongodb://admin:password@mongodb:27017/
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka_data:
    driver: local
  mongodb_data:
    driver: local
  metabase_data:
    driver: local
  postgres_data:
    driver: local
